<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discovery Downloads - Track List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            color: rgba(255,255,255,0.9);
            text-align: center;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .track-list {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .track-item {
            display: grid;
            grid-template-columns: 1fr 2fr 2fr 1fr 150px;
            align-items: center;
            padding: 20px 30px;
            border-bottom: 1px solid #f0f0f0;
            transition: background-color 0.2s ease;
        }

        .track-item:hover {
            background-color: #f8f9ff;
        }

        .track-item:last-child {
            border-bottom: none;
        }

        .track-id {
            color: #999;
            font-weight: bold;
            font-size: 1.2em;
        }

        .track-name {
            font-weight: 600;
            color: #333;
            font-size: 1.1em;
        }

        .track-artist {
            color: #666;
        }

        .track-duration {
            color: #999;
            text-align: center;
        }

        .download-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .download-btn:active {
            transform: translateY(0);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        @media (max-width: 768px) {
            .track-item {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .track-id {
                display: none;
            }

            .download-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Discovery Downloads</h1>
        <p class="subtitle">Reliability Simulation Platform - Day 1</p>
        
        <div class="track-list">
            {% if tracks %}
                {% for track in tracks %}
                <div class="track-item">
                    <div class="track-id">#{{ track.id }}</div>
                    <div class="track-name">{{ track.name }}</div>
                    <div class="track-artist">{{ track.artist }}</div>
                    <div class="track-duration">{{ track.duration }}</div>
                    <button class="download-btn">Download</button>
                </div>
                {% endfor %}
            {% else %}
                <div class="empty-state">
                    <p>No tracks available</p>
                </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
